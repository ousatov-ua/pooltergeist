  <text x="1056" y="240" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#9FE1CB" text-anchor="middle">Fan-out pipeline</text>

  <rect x="902" y="268" width="100" height="44" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="1"/>
  <text x="952" y="294" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#5DCAA5" text-anchor="middle">submit</text>
  <line x1="1002" y1="290" x2="1030" y2="290" stroke="#1D9E75" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>
  <rect x="1030" y="268" width="100" height="44" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="1"/>
  <text x="1080" y="294" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#5DCAA5" text-anchor="middle">workers</text>
  <line x1="1130" y1="290" x2="1158" y2="290" stroke="#1D9E75" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>
  <rect x="1158" y="268" width="72" height="44" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="1"/>
  <text x="1194" y="294" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#5DCAA5" text-anchor="middle">collect</text>

  <text x="1056" y="352" font-family="system-ui,sans-serif" font-size="13" fill="#5DCAA5" text-anchor="middle">Bounded deque input</text>
  <text x="1056" y="374" font-family="system-ui,sans-serif" font-size="13" fill="#5DCAA5" text-anchor="middle">Configurable parallelism</text>
  <text x="1056" y="396" font-family="system-ui,sans-serif" font-size="13" fill="#5DCAA5" text-anchor="middle">Backpressure on submit</text>
  <text x="1056" y="418" font-family="system-ui,sans-serif" font-size="13" fill="#5DCAA5" text-anchor="middle">Error tracking per result</text>
  <text x="1056" y="440" font-family="system-ui,sans-serif" font-size="13" fill="#5DCAA5" text-anchor="middle">Graceful completion wait</text>

