  <rect x="60" y="108" width="228" height="130" rx="14" fill="#26215C" stroke="#534AB7" stroke-width="1.2"/>
  <text x="174" y="158" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#EEEDFE" text-anchor="middle">Attic</text>
  <text x="174" y="184" font-family="system-ui,sans-serif" font-size="14" fill="#CECBF6" text-anchor="middle">Virtual threads</text>
  <text x="174" y="206" font-family="system-ui,sans-serif" font-size="12" fill="#7F77DD" text-anchor="middle">lightweight · plentiful</text>

  <!-- Ballroom — shifted left (was x=68, now x=20) -->
  <line x1="572" y1="358" x2="268" y2="360" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 7" opacity="0.35"/>
  <rect x="20" y="298" width="228" height="130" rx="14" fill="#26215C" stroke="#534AB7" stroke-width="1.2"/>
  <text x="134" y="348" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#EEEDFE" text-anchor="middle">Ballroom</text>
  <text x="134" y="374" font-family="system-ui,sans-serif" font-size="14" fill="#CECBF6" text-anchor="middle">CPU threads</text>
  <text x="134" y="396" font-family="system-ui,sans-serif" font-size="12" fill="#7F77DD" text-anchor="middle">ForkJoinPool · compute</text>

  <!-- Dungeon — shifted right (was x=24, now x=80) -->
  <line x1="582" y1="402" x2="308" y2="508" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 7" opacity="0.35"/>
