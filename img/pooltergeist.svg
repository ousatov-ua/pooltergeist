  <path d="M572 400 Q580 430 597 414 Q614 398 631 420 Q648 442 665 420 Q682 398 699 416 Q716 434 724 400" fill="#EEEDFE" opacity="0.95"/>
  <ellipse cx="648" cy="336" rx="78" ry="86" fill="#EEEDFE" opacity="0.95"/>
  <ellipse cx="648" cy="257" rx="72" ry="62" fill="#EEEDFE" opacity="0.95"/>
  <path d="M570 356 Q534 337 540 368 Q546 390 572 383" fill="#EEEDFE" opacity="0.87"/>
