  <text x="194" y="574" font-family="system-ui,sans-serif" font-size="12" fill="#7F77DD" text-anchor="middle">backpressure · isolated</text>

  <!-- ExecutorHub label — between Ballroom right edge (248) and ghost left (~570), centred ~x=410, at Ballroom mid-height ~y=363 -->
  <text x="318" y="368" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#AFA9EC" text-anchor="start" letter-spacing="1" opacity="0.8">ExecutorHub</text>

