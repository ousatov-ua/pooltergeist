<svg width="1280" height="640" viewBox="0 0 1280 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Pooltergeist — Java Multithreading Utility Library</title>
  <desc>Ghost center, three pool cards floating on left at different heights, TaskManager large card on right.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#AFA9EC" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#AFA9EC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ghostGlow" cx="50%" cy="48%" r="46%">
      <stop offset="0%" stop-color="#CECBF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="#1a1825"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <ellipse cx="648" cy="310" rx="230" ry="200" fill="url(#ghostGlow)"/>

  <!-- Grid -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="6 14" opacity="0.15"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="6 14" opacity="0.15"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="6 14" opacity="0.15"/>
