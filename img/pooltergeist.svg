  <line x1="726" y1="350" x2="960" y2="290" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 7" opacity="0.38"/>
  <text x="1056" y="155" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#5DCAA5" text-anchor="middle" letter-spacing="1" opacity="0.85">TaskManager</text>

